  1. Copy file ini, taruh di folder konten/<mapel>/, ganti nama sesuai bab

  2. Ganti judul, eyebrow, dan isi konten di bagian <div class="konten-wrap">

     admin > Kelola materi (isi path file-nya sesuai lokasi file ini).
-->
