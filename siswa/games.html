<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games - LMS SMK Muhammadiyah Bojong</title>
<link rel="stylesheet" href="../assets/css/style.css">
<style>
  .game-list { display: flex; flex-direction: column; gap: 12px; max-width: 640px; }
  .game-row {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 16px 18px;
  }
  .game-row h3 { font-size: 14.5px; margin: 0 0 4px; }
  .game-row .tipe-label { font-size: 12px; color: var(--text-muted); }
  .game-row .actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .btn-sm { padding: 8px 14px; font-size: 13px; }
</style>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">MP01&middot;MP02&middot;MP03<strong>LMS Siswa</strong></div>
    <div class="nav-item" onclick="location.href=(Auth.ambilSesi() && Auth.ambilSesi().role === 'admin') ? '../admin/dashboard.html' : 'dashboard.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Beranda</div>
    <div class="nav-item" onclick="location.href='materi.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5a2 2 0 0 1 2-2h11v18H6a2 2 0 0 1-2-2V5z"/><path d="M17 3v18"/></svg>Materi</div>
    <div class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="8" width="20" height="9" rx="4"/><path d="M7 12h2M8 11v2M15 12h.01M18 12h.01"/></svg>Games</div>
    <div class="nav-item" onclick="segeraHadir()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>Riwayat poin</div>
    <div class="nav-spacer"></div>
    <div class="nav-item" id="btn-logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>Keluar</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1 id="judul-halaman">Games</h1>
        <div class="subtitle" id="subjudul">Pilih mapel dulu buat lihat game yang tersedia.</div>
      </div>
    </div>

    <div id="area-mapel" class="grid" style="display:none;">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>

    <div id="area-games" class="game-list" style="display:none;"></div>
  </main>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/mapel-config.js"></script>
<script>
  const user = Auth.wajibLogin(['siswa', 'admin']);
  const modePratinjauAdmin = !!(user && user.role === 'admin');
  document.getElementById('btn-logout').addEventListener('click', () => Auth.logout());
  function segeraHadir() { alert('Halaman ini masih dalam pengembangan.'); }

  if (modePratinjauAdmin) {
    document.querySelector('.sidebar-brand').innerHTML = 'mode pratinjau<strong>Panel Admin</strong>';
    document.getElementById('subjudul').textContent = 'Pratinjau tampilan siswa (mode admin, poin tidak disimpan).';
  }

  const params = new URLSearchParams(window.location.search);
  const idMapel = params.get('mapel');

  const LABEL_TIPE = { drag_drop: 'Cocokkan pasangan', kode_simulasi: 'Simulasi kode', puzzle: 'Puzzle', kuis_timer: 'Kuis timer' };
  const URL_GAME = { drag_drop: 'game-cocokkan.html', kuis_timer: 'game-kuis.html' };

  async function muat() {
    if (idMapel) {
      if (!modePratinjauAdmin && !MapelConfig.bolehAkses(idMapel, user.kelas)) {
        const area = document.getElementById('area-games');
        area.style.display = 'flex';
        area.innerHTML = '<div class="empty-state">Mapel ini tidak tersedia untuk kelasmu.</div>';
        return;
      }
      await tampilkanGames(idMapel);
    } else {
      await tampilkanPilihanMapel();
    }
  }

  async function tampilkanPilihanMapel() {
    const area = document.getElementById('area-mapel');
    area.style.display = 'grid';
    let res;
    try {
      res = await Api.getMapel();
    } catch (err) {
      area.innerHTML = '<div class="empty-state">Tidak bisa memuat data. Periksa koneksi.</div>';
      return;
    }
    const daftarSemua = res.success ? res.data : [];
    const daftar = modePratinjauAdmin ? daftarSemua : MapelConfig.filterMapel(daftarSemua, user.kelas);
    area.innerHTML = daftar.length ? daftar.map(m => `
      <div class="card clickable" onclick="location.href='games.html?mapel=${m.id_mapel}'">
        <div class="eyebrow">${m.id_mapel}</div>
        <h3>${m.nama}</h3>
        <p>Lihat games yang tersedia untuk mapel ini.</p>
      </div>`).join('') : '<div class="empty-state">Belum ada mapel untuk kelasmu.</div>';
  }

  async function tampilkanGames(idMapel) {
    const area = document.getElementById('area-games');
    area.style.display = 'flex';
    area.innerHTML = '<div class="skeleton-card"></div>';

    let mapelRes, gamesRes;
    try {
      [mapelRes, gamesRes] = await Promise.all([Api.getMapel(), Api.getGames(idMapel)]);
    } catch (err) {
      area.innerHTML = '<div class="empty-state">Tidak bisa memuat data. Periksa koneksi.</div>';
      return;
    }

    const mapel = (mapelRes.data || []).find(m => m.id_mapel === idMapel);
    document.getElementById('judul-halaman').textContent = (mapel ? mapel.nama : 'Games');
    document.getElementById('subjudul').textContent = 'Mainkan buat kumpulkan poin.';

    const games = gamesRes.success ? gamesRes.data : [];
    if (games.length === 0) {
      area.innerHTML = '<div class="empty-state">Belum ada game untuk mapel ini.</div>';
      return;
    }

    area.innerHTML = games.map(g => {
      const bisaMain = !!URL_GAME[g.tipe];
      const tujuan = bisaMain
        ? `${URL_GAME[g.tipe]}?id=${encodeURIComponent(g.id_game)}&mapel=${encodeURIComponent(idMapel)}`
        : '#';
      return `
        <div class="game-row">
          <div>
            <h3>${g.judul}</h3>
            <div class="tipe-label">${LABEL_TIPE[g.tipe] || g.tipe} &middot; ${g.poin_max} poin</div>
          </div>
          <div class="actions">
            ${bisaMain
              ? `<button class="btn btn-primary btn-sm" onclick="location.href='${tujuan}'">Main</button>`
              : '<span class="badge badge-coral">segera hadir</span>'}
          </div>
        </div>`;
    }).join('');
  }

  muat();
</script>
</body>
</html>
