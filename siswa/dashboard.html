<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard siswa - LMS SMK Muhammadiyah Bojong</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      MP01&middot;MP02&middot;MP03
      <strong>LMS Siswa</strong>
    </div>
    <div class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Beranda</div>
    <div class="nav-item" onclick="segeraHadir()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5a2 2 0 0 1 2-2h11v18H6a2 2 0 0 1-2-2V5z"/><path d="M17 3v18"/></svg>Materi</div>
    <div class="nav-item" onclick="segeraHadir()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="8" width="20" height="9" rx="4"/><path d="M7 12h2M8 11v2M15 12h.01M18 12h.01"/></svg>Games</div>
    <div class="nav-item" onclick="segeraHadir()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>Riwayat poin</div>
    <div class="nav-spacer"></div>
    <div class="nav-item" id="btn-logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>Keluar</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1 id="sapaan">Halo</h1>
        <div class="subtitle" id="subtitle-kelas">&nbsp;</div>
      </div>
      <div class="point-readout">
        <span class="dot"></span>
        <div>
          <div class="value" id="total-poin">0000</div>
          <div class="label">total poin</div>
        </div>
      </div>
    </div>

    <h2 style="font-size:16px; margin-bottom:14px;">Mata pelajaran</h2>
    <div class="grid" id="grid-mapel">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
  </main>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
  const user = Auth.wajibLogin('siswa');

  document.getElementById('btn-logout').addEventListener('click', () => Auth.logout());

  function segeraHadir() {
    alert('Halaman ini masih dalam pengembangan.');
  }

  async function muatDashboard() {
    if (!user) return;

    document.getElementById('sapaan').textContent = 'Halo, ' + user.nama;
    document.getElementById('subtitle-kelas').innerHTML = 'Kelas ' + (user.kelas || '-') + ' &middot; NIS ' + user.nis;

    const grid = document.getElementById('grid-mapel');
    let mapelRes, nilaiRes;

    try {
      [mapelRes, nilaiRes] = await Promise.all([Api.getMapel(), Api.getRekapNilai()]);
    } catch (err) {
      grid.innerHTML = '<div class="empty-state">Tidak bisa memuat data. Periksa koneksi internet lalu muat ulang halaman.</div>';
      return;
    }

    const daftarMapel = mapelRes.success ? mapelRes.data : [];
    const semuaNilai = nilaiRes.success ? nilaiRes.data : [];
    const nilaiSaya = semuaNilai.filter(n => String(n.nis) === String(user.nis));

    const totalPoin = nilaiSaya.reduce((sum, n) => sum + Number(n.total_poin || 0), 0);
    document.getElementById('total-poin').textContent = String(totalPoin).padStart(4, '0');

    if (daftarMapel.length === 0) {
      grid.innerHTML = '<div class="empty-state">Belum ada mapel terdaftar.</div>';
      return;
    }

    grid.innerHTML = daftarMapel.map(mapel => {
      const nilaiMapel = nilaiSaya.find(n => String(n.id_mapel) === String(mapel.id_mapel));
      const poin = nilaiMapel ? nilaiMapel.total_poin : 0;
      const status = nilaiMapel && nilaiMapel.status === 'terverifikasi' ? 'nilai terverifikasi' : 'poin berjalan';
      return `
        <div class="card clickable" onclick="location.href='materi.html?mapel=${mapel.id_mapel}'">
          <div class="eyebrow">${mapel.id_mapel}</div>
          <h3>${mapel.nama}</h3>
          <p>Baca materi dan mainkan games untuk mengumpulkan poin.</p>
          <div class="card-footer">
            <span class="badge badge-gold">${poin} poin</span>
            <span>${status}</span>
          </div>
        </div>`;
    }).join('');
  }

  muatDashboard();
</script>
</body>
</html>
