<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard admin - LMS SMK Muhammadiyah Bojong</title>
<link rel="stylesheet" href="../assets/css/style.css">
<style>
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--border); }
  th { color: var(--text-secondary); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  td { color: var(--text-primary); }
  .table-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-top: 16px; }
  .table-card-head { padding: 16px 18px 0; }
</style>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      panel admin
      <strong>LMS Kontrol</strong>
    </div>
    <div class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Beranda</div>
    <div class="nav-item" onclick="location.href='kelola-materi.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5a2 2 0 0 1 2-2h11v18H6a2 2 0 0 1-2-2V5z"/><path d="M17 3v18"/></svg>Kelola materi</div>
    <div class="nav-item" onclick="location.href='kelola-games.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="8" width="20" height="9" rx="4"/><path d="M7 12h2M8 11v2M15 12h.01M18 12h.01"/></svg>Kelola games</div>
    <div class="nav-item" onclick="location.href='kelola-user.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><circle cx="17.5" cy="8.5" r="2.4"/><path d="M15.5 14.2c2.6.4 4.5 2.7 4.5 5.8"/></svg>Kelola user</div>
    <div class="nav-item" onclick="location.href='verifikasi-nilai.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 6L9 17l-5-5"/></svg>Verifikasi nilai</div>
    <div class="nav-spacer"></div>
    <div class="nav-item" id="btn-logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>Keluar</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1 id="sapaan">Halo</h1>
        <div class="subtitle">Ringkasan sistem pembelajaran</div>
      </div>
    </div>

    <h2 style="font-size:16px; margin-bottom:14px;">Mata pelajaran</h2>
    <div class="grid" id="grid-mapel">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>

    <div class="table-card">
      <div class="table-card-head">
        <h2 style="font-size:16px;">Rekap poin &amp; nilai siswa</h2>
        <p class="subtitle" style="margin:4px 0 0;">Poin terhitung otomatis, nilai final menunggu verifikasi admin.</p>
      </div>
      <table>
        <thead>
          <tr><th>NIS</th><th>Mapel</th><th>Total poin</th><th>Status</th></tr>
        </thead>
        <tbody id="tbody-nilai">
          <tr class="skeleton-row"><td><span class="skel-bar"></span></td><td><span class="skel-bar"></span></td><td><span class="skel-bar"></span></td><td><span class="skel-bar"></span></td></tr>
          <tr class="skeleton-row"><td><span class="skel-bar"></span></td><td><span class="skel-bar"></span></td><td><span class="skel-bar"></span></td><td><span class="skel-bar"></span></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
  const user = Auth.wajibLogin('admin');

  document.getElementById('btn-logout').addEventListener('click', () => Auth.logout());

  function segeraHadir() {
    alert('Halaman ini masih dalam pengembangan.');
  }

  async function muatDashboard() {
    if (!user) return;
    document.getElementById('sapaan').textContent = 'Halo, ' + user.nama;

    let mapelRes, nilaiRes;
    try {
      [mapelRes, nilaiRes] = await Promise.all([Api.getMapel(), Api.getRekapNilai()]);
    } catch (err) {
      document.getElementById('grid-mapel').innerHTML = '<div class="empty-state">Tidak bisa memuat data. Periksa koneksi internet lalu muat ulang halaman.</div>';
      document.getElementById('tbody-nilai').innerHTML = '<tr><td colspan="4">Gagal memuat data.</td></tr>';
      return;
    }

    const daftarMapel = mapelRes.success ? mapelRes.data : [];
    const namaMapel = Object.fromEntries(daftarMapel.map(m => [m.id_mapel, m.nama]));

    const grid = document.getElementById('grid-mapel');
    grid.innerHTML = daftarMapel.length
      ? daftarMapel.map(mapel => `
        <div class="card clickable" onclick="location.href='kelola-materi.html?mapel=${mapel.id_mapel}'">
          <div class="eyebrow">${mapel.id_mapel}</div>
          <h3>${mapel.nama}</h3>
          <p>Kelola materi dan games untuk mapel ini.</p>
        </div>`).join('')
      : '<div class="empty-state">Belum ada mapel terdaftar.</div>';

    const semuaNilai = nilaiRes.success ? nilaiRes.data : [];
    const tbody = document.getElementById('tbody-nilai');

    if (semuaNilai.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4">Belum ada data poin siswa.</td></tr>';
      return;
    }

    tbody.innerHTML = semuaNilai.map(n => {
      const badgeClass = n.status === 'terverifikasi' ? 'badge-teal' : 'badge-gold';
      const label = n.status === 'terverifikasi' ? 'terverifikasi' : 'draft';
      return `
        <tr>
          <td>${n.nis}</td>
          <td>${namaMapel[n.id_mapel] || n.id_mapel}</td>
          <td><span class="badge ${badgeClass}">${n.total_poin} poin</span></td>
          <td>${label}</td>
        </tr>`;
    }).join('');
  }

  muatDashboard();
</script>
</body>
</html>
